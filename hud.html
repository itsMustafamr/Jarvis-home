<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #02060f;
    --bg-1: #061521;
    --primary: #5be0ee;
    --primary-strong: #7ff0ff;
    --primary-dim: rgba(91, 224, 238, 0.5);
    --primary-faint: rgba(91, 224, 238, 0.12);
    --grid: rgba(91, 224, 238, 0.04);
    --danger: #ff5e6e;
    --text: #b8d8e8;
    --text-dim: rgba(184, 216, 232, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    overflow: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 40px 40px,
      radial-gradient(ellipse at 35% 50%, var(--bg-1) 0%, var(--bg-0) 70%);
    position: relative;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent 0 3px,
      rgba(91, 224, 238, 0.012) 3px 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 50px; height: 50px;
    border: 1px solid var(--primary-dim);
    z-index: 2;
  }
  .corner-tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
  .corner-tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
  .corner-bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
  .corner-br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

  /* Top strip */
  .hud-top {
    position: absolute;
    top: 28px; left: 92px; right: 92px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--primary-dim);
    z-index: 3;
  }
  .hud-top .group { display: flex; gap: 24px; }
  .hud-top .label-key { color: var(--text-dim); margin-right: 6px; }

  /* Main stage */
  .stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    z-index: 2;
  }

  .display-svg {
    width: min(94vw, 1500px);
    height: auto;
    aspect-ratio: 2 / 1;
    max-height: 78vh;
    display: block;
  }

  /* All SVG strokes default to fill: none */
  .display-svg circle,
  .display-svg line,
  .display-svg path,
  .display-svg polygon { fill: none; }

  /* Rings */
  .ring-outer {
    stroke: var(--primary); stroke-width: 1.2; opacity: 0.85;
    stroke-dasharray: 200 30 100 26;
  }
  .ring-mid {
    stroke: var(--primary); stroke-width: 1; opacity: 0.6;
    stroke-dasharray: 90 18 30 18 60 18;
  }
  .ring-thin {
    stroke: var(--primary-dim); stroke-width: 0.6;
  }
  .ring-dashed {
    stroke: var(--primary-strong); stroke-width: 1.2;
    stroke-dasharray: 8 6;
    opacity: 0;
    transition: opacity 0.4s;
  }

  /* Compass tick marks */
  .compass-mark { stroke: var(--primary-dim); stroke-width: 0.6; }
  .compass-mark.major { stroke: var(--primary); stroke-width: 1.2; opacity: 0.9; }
  .compass-text {
    fill: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-anchor: middle;
  }

  /* Core: outer glowing ring around a darker interior, so the glowing
     JARVIS text can read clearly against it (matches the reference). */
  .core {
    fill: rgba(91, 224, 238, 0.05);
    stroke: var(--primary);
    stroke-width: 1.8;
    filter: drop-shadow(0 0 14px var(--primary));
    transform-origin: center;
    transform-box: fill-box;
    transition: filter 0.3s, fill 0.3s, stroke 0.3s;
  }
  .core-inner {
    fill: none;
    stroke: rgba(91, 224, 238, 0.28);
    stroke-width: 0.6;
    transform-origin: center;
    transform-box: fill-box;
  }
  /* Tiny bright pip just below the text — a subtle focal point */
  .core-pip {
    fill: var(--primary-strong);
    filter: drop-shadow(0 0 6px var(--primary));
  }

  /* J.A.R.V.I.S label — bright cyan with a layered glow halo */
  .label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    letter-spacing: 0.18em;
    fill: var(--primary-strong);
    font-size: 17px;
    text-anchor: middle;
    filter:
      drop-shadow(0 0 3px var(--primary))
      drop-shadow(0 0 8px rgba(91, 224, 238, 0.7))
      drop-shadow(0 0 16px rgba(91, 224, 238, 0.35));
    transition: filter 0.3s, opacity 0.3s;
  }

  /* Triangle pointer at 3 o'clock */
  .pointer {
    stroke: var(--primary); stroke-width: 1.2;
    transform-origin: center;
  }

  /* Left bracket */
  .bracket-line { stroke: var(--primary); stroke-width: 1.2; }
  .bracket-tick { stroke: var(--primary-dim); stroke-width: 0.8; }

  /* Amplitude bars around the orb's rim — v1-style radial bars that
     pulse outward in the speaking state. */
  .amp-bar {
    stroke: var(--primary); stroke-width: 2.2; stroke-linecap: round;
    opacity: 0;
    transform-origin: center;
    transform-box: fill-box;
    transition: opacity 0.3s;
  }

  /* =================== Animations =================== */

  @keyframes rotcw  { from { transform: rotate(0deg);}  to { transform: rotate(360deg);} }
  @keyframes rotccw { from { transform: rotate(0deg);}  to { transform: rotate(-360deg);} }
  @keyframes pulse-slow { 0%,100% { transform: scale(1);    opacity: 0.6; } 50% { transform: scale(1.06); opacity: 1; } }
  @keyframes pulse-fast { 0%,100% { transform: scale(1);    opacity: 0.9; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes pulse-think{ 0%,100% { transform: scale(0.92); opacity: 0.4; } 50% { transform: scale(1.05); opacity: 0.7; } }
  @keyframes amp-pulse { 0%,100% { transform: scaleY(0.25); opacity: 0.45;} 50% { transform: scaleY(1); opacity: 1;} }
  @keyframes pointer-spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }

  .compass-group   { transform-origin: 500px 250px; animation: rotcw  140s linear infinite; }
  .ring-outer-grp  { transform-origin: 500px 250px; animation: rotccw 110s linear infinite; }
  .ring-mid-grp    { transform-origin: 500px 250px; animation: rotcw   75s linear infinite; }

  /* IDLE */
  [data-state="idle"] .core,
  [data-state="idle"] .core-inner {
    animation: pulse-slow 4s ease-in-out infinite;
  }
  [data-state="idle"] .amp-bar { opacity: 0.25; }

  /* LISTENING */
  [data-state="listening"] .core,
  [data-state="listening"] .core-inner {
    animation: pulse-fast 0.85s ease-in-out infinite;
  }
  [data-state="listening"] .core { filter: drop-shadow(0 0 22px var(--primary-strong)); }
  [data-state="listening"] .label {
    filter:
      drop-shadow(0 0 5px var(--primary-strong))
      drop-shadow(0 0 12px rgba(91, 224, 238, 0.85))
      drop-shadow(0 0 20px rgba(91, 224, 238, 0.45));
  }
  [data-state="listening"] .amp-bar { opacity: 0.55; }

  /* THINKING */
  [data-state="thinking"] .ring-dashed {
    opacity: 1;
    transform-origin: 500px 250px;
    animation: rotcw 3.2s linear infinite;
  }
  [data-state="thinking"] .core,
  [data-state="thinking"] .core-inner {
    animation: pulse-think 1.4s ease-in-out infinite;
  }
  [data-state="thinking"] .label {
    opacity: 0.7;
    filter:
      drop-shadow(0 0 2px var(--primary))
      drop-shadow(0 0 6px rgba(91, 224, 238, 0.4));
  }

  /* SPEAKING — rim amplitude bars pulse, label glows hardest */
  [data-state="speaking"] .amp-bar {
    opacity: 1;
    animation: amp-pulse var(--dur, 0.5s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  [data-state="speaking"] .core { filter: drop-shadow(0 0 28px var(--primary-strong)); }
  [data-state="speaking"] .core,
  [data-state="speaking"] .core-inner {
    animation: pulse-fast 1.4s ease-in-out infinite;
  }
  [data-state="speaking"] .label {
    filter:
      drop-shadow(0 0 6px var(--primary-strong))
      drop-shadow(0 0 14px rgba(91, 224, 238, 0.9))
      drop-shadow(0 0 24px rgba(91, 224, 238, 0.5));
  }

  /* ERROR */
  [data-state="error"] .core {
    fill: rgba(255, 94, 110, 0.06);
    stroke: var(--danger);
    filter: drop-shadow(0 0 16px var(--danger));
    animation: pulse-fast 0.55s ease-in-out infinite;
  }
  [data-state="error"] .core-inner { stroke: rgba(255, 94, 110, 0.3); }
  [data-state="error"] .label {
    fill: #ff9098;
    filter:
      drop-shadow(0 0 4px var(--danger))
      drop-shadow(0 0 10px rgba(255, 94, 110, 0.7));
  }
  [data-state="error"] .core-pip { fill: var(--danger); }

  /* Bottom strip */
  .hud-bottom {
    position: absolute;
    bottom: 28px; left: 92px; right: 92px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 3;
  }
  .status-line {
    display: flex; align-items: center; gap: 14px;
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--primary);
  }
  .status-line::before, .status-line::after {
    content: ''; display: inline-block;
    width: 48px; height: 1px; background: var(--primary-dim);
  }
  .caption {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px; font-weight: 400; letter-spacing: 0.14em;
    color: var(--text);
    min-height: 1.6em;
    text-align: center;
    max-width: 80%;
    transition: opacity 0.3s;
  }

  /* Dev panel */
  .dev-panel {
    position: absolute;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 10;
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  .dev-panel:hover { opacity: 1; }
  .dev-panel.hidden { display: none; }
  .dev-panel button {
    background: transparent;
    border: 1px solid var(--primary-dim);
    color: var(--primary);
    padding: 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dev-panel button:hover {
    background: var(--primary-faint);
    border-color: var(--primary);
  }
  .dev-panel button.active {
    background: var(--primary-faint);
    border-color: var(--primary);
    box-shadow: 0 0 12px var(--primary-dim);
    color: #fff;
  }
</style>
</head>
<body data-state="idle">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="hud-top">
    <div class="group">
      <span><span class="label-key">SYS</span>JARVIS v1.0</span>
      <span><span class="label-key">MODE</span><span id="mode-text">STANDBY</span></span>
    </div>
    <div class="group">
      <span><span class="label-key">UTC</span><span id="clock">--:--:--</span></span>
      <span><span class="label-key">PWR</span>100%</span>
    </div>
  </div>

  <div class="stage">
    <!--
      Single SVG canvas, 1000x500 viewBox.
      Orb is anchored at (500, 250) — true center, directly above the
      SYSTEM READY bar. When content mode lands in Phase 3+, the orb
      will animate left to make room for a panel on the right.
    -->
    <svg class="display-svg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">

      <!-- Compass tick ring (rotates, with major ticks every 5) -->
      <g class="compass-group" id="compass-group"></g>

      <!-- Outer arc-segmented ring (counter-rotates) -->
      <g class="ring-outer-grp">
        <circle class="ring-outer" cx="500" cy="250" r="170" />
      </g>

      <!-- Mid arc-segmented ring (rotates) -->
      <g class="ring-mid-grp">
        <circle class="ring-mid" cx="500" cy="250" r="140" />
      </g>

      <!-- Dashed thinking ring (visible only in thinking state) -->
      <circle class="ring-dashed" cx="500" cy="250" r="115" />

      <!-- Thin static inner rings -->
      <circle class="ring-thin" cx="500" cy="250" r="98" />
      <circle class="ring-thin" cx="500" cy="250" r="82" />

      <!-- Rim amplitude bars (radial, generated in JS). Visible in
           the speaking state, faint otherwise. -->
      <g class="amp-bars" id="amp-bars"></g>

      <!-- Core: outer glowing ring + subtle inner ring (mostly hollow
           so the glowing JARVIS text reads clearly inside) -->
      <circle class="core" cx="500" cy="250" r="62" />
      <circle class="core-inner" cx="500" cy="250" r="48" />

      <!-- J.A.R.V.I.S label — bright, glowing -->
      <text class="label" x="500" y="252">J.A.R.V.I.S</text>

      <!-- Small bright pip just below the text -->
      <circle class="core-pip" cx="500" cy="268" r="2.2" />

      <!-- Triangle pointer at 3 o'clock (just outside ring-mid) -->
      <polygon class="pointer" points="670,242 684,250 670,258" />
      <polygon class="pointer" points="655,245 663,250 655,255" />

      <!-- Left bracket at 9 o'clock -->
      <g class="bracket">
        <line class="bracket-line" x1="320" y1="244" x2="320" y2="256" />
        <line class="bracket-line" x1="320" y1="244" x2="340" y2="244" />
        <line class="bracket-line" x1="320" y1="256" x2="340" y2="256" />
        <line class="bracket-line" x1="340" y1="250" x2="350" y2="250" />
        <line class="bracket-tick" x1="300" y1="250" x2="320" y2="250" />
        <line class="bracket-tick" x1="305" y1="240" x2="315" y2="240" />
        <line class="bracket-tick" x1="305" y1="260" x2="315" y2="260" />
      </g>

    </svg>
  </div>

  <div class="dev-panel" id="dev-panel">
    <button data-set-state="idle" class="active">IDLE</button>
    <button data-set-state="listening">LISTENING</button>
    <button data-set-state="thinking">THINKING</button>
    <button data-set-state="speaking">SPEAKING</button>
    <button data-set-state="error">ERROR</button>
  </div>

  <div class="hud-bottom">
    <div class="status-line"><span id="status-text">SYSTEM READY</span></div>
    <div class="caption" id="caption"></div>
  </div>

<script>
  const SVGNS = 'http://www.w3.org/2000/svg';
  const CX = 500, CY = 250;  // orb center

  // ---- Compass ring ----
  (function() {
    const g = document.getElementById('compass-group');
    const N = 60;
    const rOuter = 188, rTickShort = 192, rTickLong = 198;
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * 360 - 90;
      const rad = angle * Math.PI / 180;
      const isMajor = i % 5 === 0;
      const r2 = isMajor ? rTickLong : rTickShort;
      const x1 = CX + Math.cos(rad) * rOuter;
      const y1 = CY + Math.sin(rad) * rOuter;
      const x2 = CX + Math.cos(rad) * r2;
      const y2 = CY + Math.sin(rad) * r2;
      const line = document.createElementNS(SVGNS, 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('class', isMajor ? 'compass-mark major' : 'compass-mark');
      g.appendChild(line);
    }
    // Cardinal labels
    const cardinals = [['N', -90], ['E', 0], ['S', 90], ['W', 180]];
    cardinals.forEach(([label, deg]) => {
      const rad = deg * Math.PI / 180;
      const r = 180;
      const txt = document.createElementNS(SVGNS, 'text');
      txt.setAttribute('class', 'compass-text');
      txt.setAttribute('x', (CX + Math.cos(rad) * r).toFixed(2));
      txt.setAttribute('y', (CY + Math.sin(rad) * r + 3).toFixed(2));
      txt.textContent = label;
      g.appendChild(txt);
    });
  })();

  // ---- Rim amplitude bars (v1-style radial bars around the orb) ----
  (function() {
    const g = document.getElementById('amp-bars');
    const N = 48;
    const baseR = 148;   // inner end of each bar (just inside ring-mid at r=140? actually outside)
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * 360 - 90;
      const rad = angle * Math.PI / 180;
      const len = 8 + Math.random() * 16;
      const x1 = CX + Math.cos(rad) * baseR;
      const y1 = CY + Math.sin(rad) * baseR;
      const x2 = CX + Math.cos(rad) * (baseR + len);
      const y2 = CY + Math.sin(rad) * (baseR + len);
      const line = document.createElementNS(SVGNS, 'line');
      line.setAttribute('class', 'amp-bar');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      // Staggered animation per-bar
      line.style.setProperty('--dur', (0.38 + Math.random() * 0.5) + 's');
      line.style.setProperty('--delay', (Math.random() * 0.6) + 's');
      g.appendChild(line);
    }
  })();

  // ---- State machine ----
  const STATES = {
    idle:      { mode: 'STANDBY', status: 'SYSTEM READY',     caption: '' },
    listening: { mode: 'CAPTURE', status: 'LISTENING',        caption: '...' },
    thinking:  { mode: 'PROCESS', status: 'EVALUATING',       caption: '' },
    speaking:  { mode: 'OUTPUT',  status: 'TRANSMITTING',     caption: '' },
    error:     { mode: 'FAULT',   status: 'ERROR — SEE LOG', caption: '' },
  };
  const body = document.body;
  const captionEl = document.getElementById('caption');
  const statusEl  = document.getElementById('status-text');
  const modeEl    = document.getElementById('mode-text');
  const buttons   = document.querySelectorAll('.dev-panel button');

  window.HUD = {
    setState(state) {
      if (!STATES[state]) return;
      body.dataset.state = state;
      const s = STATES[state];
      modeEl.textContent = s.mode;
      statusEl.textContent = s.status;
      if (state !== 'speaking') captionEl.textContent = s.caption;
      buttons.forEach(b => b.classList.toggle('active', b.dataset.setState === state));
    },
    setCaption(text) { captionEl.textContent = text || ''; }
  };

  buttons.forEach(b =>
    b.addEventListener('click', () => HUD.setState(b.dataset.setState))
  );

  // ---- Live UTC clock ----
  function tickClock() {
    const d = new Date();
    const pad = n => n.toString().padStart(2, '0');
    document.getElementById('clock').textContent =
      pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds());
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---- Keyboard shortcuts ----
  const KEY_STATE = { '1':'idle', '2':'listening', '3':'thinking', '4':'speaking', '5':'error' };
  document.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') {
      document.getElementById('dev-panel').classList.toggle('hidden');
    } else if (KEY_STATE[e.key]) {
      HUD.setState(KEY_STATE[e.key]);
    } else if (e.key === 'f' || e.key === 'F') {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    }
  });

  // ---- Demo cycle (?demo=1) ----
  if (new URLSearchParams(location.search).get('demo') === '1') {
    const cycle = ['idle', 'listening', 'thinking', 'speaking', 'idle'];
    let i = 0;
    setInterval(() => {
      HUD.setState(cycle[i % cycle.length]);
      if (cycle[i % cycle.length] === 'speaking') {
        HUD.setCaption('All systems operational, sir.');
      }
      i++;
    }, 2800);
  }

  HUD.setState('idle');

  // ---- Live WebSocket subscription to pipeline state events ----
  // Subscribes to server.py's HUD channel; reacts to {type:'state', state, caption}
  // messages forwarded from hud_state.publish() calls in pipeline.py /
  // local_input.py. Auto-reconnects if the server bounces.
  // Skip when ?dev=1 — useful for visual tweaking with the local buttons.
  (function() {
    if (new URLSearchParams(location.search).get('dev') === '1') return;
    let ws = null, reconnectTimer = null;
    function connect() {
      try {
        ws = new WebSocket(`ws://${location.hostname}:8765`);
      } catch (e) {
        scheduleReconnect();
        return;
      }
      ws.onopen = () => {
        try { ws.send(JSON.stringify({ type: 'subscribe', channel: 'hud' })); } catch {}
      };
      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type === 'state') {
          if (msg.state) HUD.setState(msg.state);
          if (typeof msg.caption === 'string') HUD.setCaption(msg.caption);
        }
      };
      ws.onclose = () => { scheduleReconnect(); };
      ws.onerror = () => { try { ws.close(); } catch {} };
    }
    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 2000);
    }
    connect();
  })();
</script>
</body>
</html>
